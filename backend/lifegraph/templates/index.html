<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeGraph</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #header { padding: 0.75rem 1rem; background: #1a1a2e; color: #eee; }
        #header h1 { font-size: 1.25rem; }
        #main { flex: 1; display: flex; overflow: hidden; }
        #graph-container { flex: 1; }
        #sidebar { width: 300px; border-left: 1px solid #ddd; padding: 1rem; overflow-y: auto; }
        .error-banner { background: #fee; color: #c00; padding: 0.5rem 1rem; text-align: center; }
    </style>
</head>
<body>
    <div id="header">
        <h1>LifeGraph</h1>
    </div>
    <div id="main">
        <div id="graph-container"></div>
        <div id="sidebar"></div>
    </div>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/graphView.js') }}"></script>
    <script src="{{ url_for('static', filename='js/graphEditor.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/search.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
