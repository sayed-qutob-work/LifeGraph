<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeGraph</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #182026;
            background: #f4f6f8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #header {
            min-height: 52px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #d8dee4;
            background: #ffffff;
        }
        #header h1 {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0;
        }
        #main {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(380px, 430px);
            grid-template-rows: minmax(0, 1fr);
            overflow: hidden;
        }
        #graph-container {
            min-width: 0;
            min-height: 0;
            height: 100%;
            background: #ffffff;
        }
        #sidebar {
            min-width: 0;
            border-left: 1px solid #d8dee4;
            background: #fbfcfd;
            padding: 14px;
            overflow-y: auto;
        }
        .app-section {
            padding: 14px 0;
            border-bottom: 1px solid #e3e7eb;
        }
        .app-section:first-child { padding-top: 0; }
        .app-section-title,
        .search-filter-title,
        .graph-editor-form h3,
        .app-proposal h4,
        .app-entities-heading {
            margin-bottom: 8px;
            font-size: 0.82rem;
            line-height: 1.2;
            font-weight: 700;
            color: #34424d;
        }
        textarea,
        input,
        select {
            width: 100%;
            min-height: 34px;
            border: 1px solid #c8d0d8;
            border-radius: 6px;
            padding: 7px 9px;
            background: #ffffff;
            color: #182026;
            font: inherit;
            font-size: 0.88rem;
        }
        textarea { resize: vertical; }
        button {
            min-height: 32px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 6px 10px;
            font: inherit;
            font-size: 0.86rem;
            font-weight: 650;
            cursor: pointer;
        }
        .btn-primary {
            background: #1f6feb;
            color: #ffffff;
            border-color: #1f6feb;
        }
        .btn-secondary,
        .app-entity-actions button {
            background: #ffffff;
            color: #34424d;
            border-color: #c8d0d8;
        }
        .form-group,
        .form-actions,
        .app-editor-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .form-group {
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 0.78rem;
            font-weight: 650;
            color: #52616d;
        }
        .form-error,
        .app-proposal-error,
        .app-parse-status,
        .search-status {
            margin-top: 8px;
            min-height: 18px;
            color: #b42318;
            font-size: 0.82rem;
        }
        .app-proposal-summary,
        .app-entities-empty {
            color: #52616d;
            font-size: 0.86rem;
        }
        .app-proposal-block { margin-top: 12px; }
        .app-proposal-table {
            display: grid;
            gap: 6px;
            overflow-x: auto;
        }
        .app-proposal-row {
            display: grid;
            gap: 6px;
            align-items: center;
            min-width: 680px;
        }
        .app-proposal-node-table .app-proposal-row {
            grid-template-columns: 42px minmax(150px, 1.1fr) 130px minmax(160px, 1fr);
        }
        .app-proposal-edge-table .app-proposal-row {
            grid-template-columns: 42px minmax(120px, 1fr) 120px 150px minmax(120px, 1fr) 120px;
        }
        .app-proposal-head {
            color: #52616d;
            font-size: 0.72rem;
            font-weight: 750;
            text-transform: uppercase;
        }
        .app-proposal-use {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-proposal-use input {
            width: 18px;
            min-height: 18px;
        }
        .app-entity-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            list-style: none;
            margin: 8px 0 12px;
        }
        .app-entity {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid #eef1f4;
        }
        .app-entity-label {
            min-width: 0;
            overflow-wrap: anywhere;
            font-size: 0.86rem;
        }
        .app-entity-actions {
            display: flex;
            gap: 5px;
        }
        .search-type-checkboxes {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 5px;
        }
        .search-type-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        .search-type-checkbox input {
            width: 16px;
            min-height: 16px;
        }
        .error-banner {
            background: #fff1f0;
            color: #b42318;
            padding: 0.65rem 1rem;
            text-align: center;
        }
        /* Dashboard additions */
        .dashboard-recent-item { flex-direction: column; align-items: flex-start; gap: 2px; }
        .dashboard-recent-label { font-size: 0.86rem; font-weight: 600; }
        .dashboard-recent-meta { font-size: 0.74rem; color: #7a8895; }
        .dashboard-section-toggle { cursor: pointer; user-select: none; }
        .dashboard-section-toggle::before { content: "▶ "; font-size: 0.7rem; }
        .dashboard-section-toggle[aria-expanded="true"]::before { content: "▼ "; }
        .dashboard-collapsible-body { margin-top: 4px; }
        /* Context panel */
        .context-panel-hint {
            color: #7a8895;
            font-size: 0.82rem;
            font-style: italic;
        }
        .context-panel-header {
            margin-bottom: 8px;
            font-size: 0.88rem;
        }
        .context-panel-node-label { font-weight: 700; }
        .context-panel-node-type { color: #52616d; }
        .context-panel-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .context-hops-label {
            font-size: 0.78rem;
            font-weight: 650;
            color: #52616d;
            white-space: nowrap;
        }
        .context-hops-select {
            width: 60px;
            min-height: 32px;
            padding: 5px 6px;
        }
        .context-status {
            min-height: 16px;
            font-size: 0.82rem;
            color: #52616d;
            margin-bottom: 4px;
        }
        .context-snapshot {
            font-family: ui-monospace, "Cascadia Code", "Fira Mono", monospace;
            font-size: 0.78rem;
            line-height: 1.5;
            resize: vertical;
            background: #f6f8fa;
        }
        @media (max-width: 900px) {
            body { height: auto; min-height: 100vh; }
            #main {
                grid-template-columns: 1fr;
                overflow: visible;
            }
            #graph-container {
                min-height: 55vh;
            }
            #sidebar {
                border-left: 0;
                border-top: 1px solid #d8dee4;
            }
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>LifeGraph</h1>
    </div>
    <div id="main">
        <div id="graph-container"></div>
        <div id="sidebar"></div>
    </div>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/graphView.js') }}"></script>
    <script src="{{ url_for('static', filename='js/graphEditor.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/search.js') }}"></script>
    <script src="{{ url_for('static', filename='js/contextPanel.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
